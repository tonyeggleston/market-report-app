<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarketPulse — Review Comps</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="review-container">
    <div class="review-header">
      <div>
        <h1>Review Comparable Listings</h1>
        <p style="color: #666; font-size: 14px; margin-top: 2px;">Check the AI's picks. Toggle any comp on/off. Edit descriptions before generating the email.</p>
      </div>
    </div>

    <div class="summary-bar" id="summary-bar"></div>

    <div id="comp-sections"></div>
  </div>

  <div class="finalize-bar">
    <div class="count-text" id="count-text"></div>
    <div style="display: flex; gap: 12px;">
      <button class="btn btn-secondary" onclick="goBack()">Back to Dashboard</button>
      <button class="btn btn-primary btn-large" onclick="finalizeReport()">Generate Email</button>
    </div>
  </div>

  <script>
    function esc(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = String(str);
      return div.innerHTML;
    }

    let reportData = null;

    window.api.onReviewData((data) => {
      reportData = data;
      renderReview();
    });

    function renderReview() {
      if (!reportData) return;
      const { comps, visionResults, diff, metrics, compDescriptions, photosByMls, ourListing } = reportData;

      const summaryBar = document.getElementById('summary-bar');
      summaryBar.innerHTML = `
        <div class="summary-stat"><div class="num">${comps.length}</div><div class="label">Total Listings</div></div>
        <div class="summary-stat"><div class="num">${diff.summary.newCount}</div><div class="label">New</div></div>
        <div class="summary-stat"><div class="num">${diff.summary.statusChangeCount}</div><div class="label">Status Changes</div></div>
        <div class="summary-stat"><div class="num">${metrics.showingCount}</div><div class="label">Showings (2wk)</div></div>
        <div class="summary-stat"><div class="num">${metrics.showingsPerListing}</div><div class="label">Market Avg</div></div>
      `;

      const sections = document.getElementById('comp-sections');
      let html = '';

      const ourMls = ourListing?.mlsNumber;
      const newMls = new Set(diff.newListings.map(l => l.mlsNumber));
      const changedMls = new Set(diff.statusChanges.map(l => l.mlsNumber));

      if (diff.newListings.length) {
        html += '<div class="section-divider">New Listings</div>';
        for (const comp of diff.newListings) {
          html += renderCompCard(comp, visionResults, compDescriptions, photosByMls, 'new-listing');
        }
      }

      if (diff.statusChanges.length) {
        html += '<div class="section-divider">Status Changes (Under Contract)</div>';
        for (const comp of diff.statusChanges) {
          html += renderCompCard(comp, visionResults, compDescriptions, photosByMls, 'status-change');
        }
      }

      const otherComps = comps.filter(c =>
        c.mlsNumber !== ourMls && !newMls.has(c.mlsNumber) && !changedMls.has(c.mlsNumber)
      );
      if (otherComps.length) {
        html += '<div class="section-divider">Existing Comps</div>';
        for (const comp of otherComps) {
          html += renderCompCard(comp, visionResults, compDescriptions, photosByMls, '');
        }
      }

      sections.innerHTML = html;
      updateCount();
    }

    function renderCompCard(comp, visionResults, descriptions, photosByMls, extraClass) {
      const vision = visionResults?.[comp.mlsNumber];
      const included = vision?.includeRecommendation ?? true;
      const cardClass = included ? 'included' : 'excluded';
      const score = vision?.matchScore || '—';
      const desc = descriptions?.[comp.mlsNumber] || '';
      const photoCount = photosByMls?.[comp.mlsNumber]?.photoCount || 0;
      const analysis = vision?.analysis || {};

      let badges = '';
      if (extraClass === 'new-listing') badges += '<span class="badge badge-new">New</span>';
      if (extraClass === 'status-change') badges += `<span class="badge badge-contract">${esc(comp.status)}</span>`;
      badges += `<span class="badge badge-score">Score: ${esc(score)}/10</span>`;
      badges += included
        ? '<span class="badge badge-include">Include</span>'
        : '<span class="badge badge-exclude">Exclude</span>';

      const redFlagHtml = (vision?.redFlags || []).length
        ? `<div class="red-flags">${vision.redFlags.map(f => `<span class="red-flag-tag">${esc(f)}</span>`).join('')}</div>`
        : '';

      const kitchenHtml = analysis.kitchen
        ? `<div class="vision-item"><div class="vi-label">Kitchen</div><div class="vi-value">${esc(analysis.kitchen.update_level || '—')}${analysis.kitchen.white_cabinets ? ', white cabinets' : ''}${analysis.kitchen.stainless_appliances ? ', stainless' : ''}</div></div>`
        : '';

      const bathroomHtml = (analysis.bathrooms || []).map((b, i) =>
        `<div class="vision-item"><div class="vi-label">Bathroom ${i + 1}</div><div class="vi-value">${esc(b.update_level || '—')}, ${esc(b.palette || '—')}${b.standalone_tub ? ', standalone tub' : ''}</div></div>`
      ).join('');

      const flooringHtml = analysis.flooring
        ? `<div class="vision-item"><div class="vi-label">Flooring</div><div class="vi-value">${esc(analysis.flooring.type || '—')}${analysis.flooring.consistent ? ', consistent' : ', inconsistent'}</div></div>`
        : '';

      const outdoorHtml = analysis.outdoor
        ? `<div class="vision-item"><div class="vi-label">Outdoor</div><div class="vi-value">${analysis.outdoor.covered_patio ? 'Covered patio' : 'No covered patio'}, ${analysis.outdoor.pool ? 'Pool' : 'No pool'}, ${esc(analysis.outdoor.backyard_size || '—')} yard</div></div>`
        : '';

      return `
        <div class="comp-card ${cardClass} ${extraClass}" data-mls="${comp.mlsNumber}">
          <div class="comp-top" onclick="toggleDetail('${comp.mlsNumber}')">
            <div>
              <div class="comp-address">${esc(comp.address || comp.mlsNumber)}</div>
              <div class="comp-meta">${esc(comp.sqft)} sqft &bull; ${esc(comp.yearBuilt)} &bull; ${esc(comp.lotAcres)} acres &bull; ${comp.hasPool ? 'Pool' : 'No pool'} &bull; $${esc(comp.price)} &bull; ${esc(comp.dom)} DOM</div>
            </div>
            <div style="display: flex; align-items: center; gap: 16px;">
              <div class="comp-badges">${badges}</div>
              <div class="comp-toggle" onclick="event.stopPropagation()">
                <input type="checkbox" id="inc-${comp.mlsNumber}" ${included ? 'checked' : ''} onchange="toggleInclude('${comp.mlsNumber}', this.checked)">
                <label for="inc-${comp.mlsNumber}">Include</label>
              </div>
            </div>
          </div>
          <div class="comp-detail" id="detail-${comp.mlsNumber}">
            <div class="photo-strip" id="photos-${comp.mlsNumber}">
              <span style="color: #999; font-size: 13px;">${photoCount} photos analyzed</span>
            </div>
            <div class="vision-grid">
              ${kitchenHtml}
              ${bathroomHtml}
              ${flooringHtml}
              ${outdoorHtml}
              <div class="vision-item"><div class="vi-label">Overall Update</div><div class="vi-value">${esc(vision?.overallUpdateLevel || '—')}</div></div>
              <div class="vision-item"><div class="vi-label">Palette</div><div class="vi-value">${analysis.palette?.modern_whites_grays ? 'Modern whites/grays' : esc(analysis.palette?.dominant_colors?.join(', ') || '—')}</div></div>
            </div>
            ${redFlagHtml}
            <div class="reasoning-box">
              <strong>AI Reasoning:</strong> ${esc(vision?.reasoning || 'No analysis available.')}
            </div>
            <div class="description-edit">
              <label>Email Description (edit before sending):</label>
              <textarea rows="3" id="desc-${comp.mlsNumber}" oninput="editDescription('${comp.mlsNumber}', this.value)">${esc(desc)}</textarea>
            </div>
          </div>
        </div>
      `;
    }

    function toggleDetail(mlsNumber) {
      const el = document.getElementById(`detail-${mlsNumber}`);
      el.classList.toggle('open');
    }

    function toggleInclude(mlsNumber, checked) {
      const card = document.querySelector(`[data-mls="${mlsNumber}"]`);
      card.classList.toggle('included', checked);
      card.classList.toggle('excluded', !checked);

      const badges = card.querySelectorAll('.badge-include, .badge-exclude');
      badges.forEach(b => {
        if (checked) { b.className = 'badge badge-include'; b.textContent = 'Include'; }
        else { b.className = 'badge badge-exclude'; b.textContent = 'Exclude'; }
      });

      if (!window._overrides) window._overrides = {};
      window._overrides[mlsNumber] = checked;
      updateCount();
    }

    function editDescription(mlsNumber, value) {
      if (!window._descEdits) window._descEdits = {};
      window._descEdits[mlsNumber] = value;
    }

    function updateCount() {
      const checkboxes = document.querySelectorAll('.comp-toggle input[type="checkbox"]');
      let included = 0;
      checkboxes.forEach(cb => { if (cb.checked) included++; });
      document.getElementById('count-text').innerHTML = `<strong>${included}</strong> of ${checkboxes.length} comps included`;
    }

    async function finalizeReport() {
      const result = await window.api.finalizeReport(
        window._overrides || {},
        window._descEdits || {}
      );
      if (result?.emailBody || result?.emailHtml) {
        window.api.showEmail({
          text: result.emailBody,
          html: result.emailHtml,
        });
      }
    }

    function goBack() {
      window.api.goBack();
    }
  </script>
</body>
</html>
