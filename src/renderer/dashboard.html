<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Market Report Generator</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .phase-list { list-style: none; padding: 0; margin: 16px 0; }
    .phase-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 8px; font-size: 14px; color: #666; }
    .phase-item.active { background: #eff6ff; color: #1e40af; font-weight: 600; }
    .phase-item.done { color: #16a34a; }
    .phase-item .phase-icon { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #d1d5db; display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; }
    .phase-item.active .phase-icon { border-color: #2563eb; background: #2563eb; color: #fff; }
    .phase-item.done .phase-icon { border-color: #16a34a; background: #16a34a; color: #fff; }
    .phase-detail { font-size: 12px; color: #999; margin-left: 32px; margin-top: -4px; margin-bottom: 4px; }
    .phase-item.active + .phase-detail { color: #3b82f6; }

    .email-result { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 10px; padding: 20px; margin-top: 16px; white-space: pre-wrap; font-size: 14px; line-height: 1.6; max-height: 400px; overflow-y: auto; }
    .result-bar { display: flex; gap: 12px; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="dashboard">
    <header class="dash-header">
      <h1>Market Report Generator</h1>
      <button class="btn btn-small" onclick="openSettings()">Settings</button>
    </header>

    <!-- Run Section -->
    <section class="run-section" id="run-section">
      <h2>Generate a Report</h2>
      <div class="form-group">
        <label for="listing-address">Listing Street Name</label>
        <input type="text" id="listing-address" placeholder="e.g. 15 Hillcrest">
        <small>Type the street name exactly as it appears in your MLS saved search</small>
      </div>
      <button class="btn btn-primary btn-large" id="run-btn" onclick="runReport()">
        Run Report
      </button>
    </section>

    <!-- Progress Section -->
    <section class="progress-section hidden" id="progress-section">
      <h2>Working...</h2>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
      <ul class="phase-list" id="phase-list"></ul>
    </section>

    <!-- Email Result Section (shown after finalize) -->
    <section class="result-section hidden" id="result-section">
      <h2>Report Complete</h2>
      <div class="result-bar">
        <button class="btn btn-primary" onclick="copyEmail()">Copy Email (with Photos)</button>
        <button class="btn btn-secondary" onclick="newReport()">New Report</button>
      </div>
      <div class="email-result" id="email-result"></div>
    </section>

    <!-- Error Display -->
    <section class="error-section hidden" id="error-section">
      <div style="background: #fef2f2; border: 1px solid #fecaca; border-radius: 12px; padding: 24px; text-align: center;">
        <div style="font-size: 32px; margin-bottom: 8px;">&#9888;</div>
        <h3 style="color: #991b1b; margin-bottom: 8px;">Something went wrong</h3>
        <p style="color: #7f1d1d; font-size: 14px; margin-bottom: 16px;" id="error-message"></p>
        <div style="display: flex; gap: 12px; justify-content: center;">
          <button class="btn btn-primary" onclick="dismissError()">Try Again</button>
          <button class="btn btn-secondary" onclick="openSettings()">Check Settings</button>
        </div>
      </div>
    </section>

    <!-- Settings Modal -->
    <div class="modal hidden" id="settings-modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Settings</h2>
          <button class="btn btn-small" onclick="closeSettings()">Close</button>
        </div>
        <div class="modal-body" id="settings-body">
          <p>Loading...</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const phases = [
      { key: 'mls-login',        label: 'Logging into MLS' },
      { key: 'mls-search',       label: 'Running saved search' },
      { key: 'mls-photos',       label: 'Downloading listing photos' },
      { key: 'mls-details',      label: 'Extracting listing details' },
      { key: 'vision-subject',   label: 'Analyzing subject property' },
      { key: 'vision-comps',     label: 'Analyzing comp photos (AI)' },
      { key: 'mls-price-search', label: 'Running price-only search' },
      { key: 'bb-login',         label: 'Logging into BrokerBay' },
      { key: 'bb-showings',      label: 'Pulling showing data' },
      { key: 'bb-trends',        label: 'Pulling market trends' },
      { key: 'diff',             label: 'Comparing to previous report' },
      { key: 'metrics',          label: 'Calculating market metrics' },
      { key: 'descriptions',     label: 'Generating descriptions (AI)' },
      { key: 'done',             label: 'Ready for review' },
    ];

    let currentPhaseIndex = -1;
    let currentEmail = null;

    function renderPhases() {
      const list = document.getElementById('phase-list');
      list.innerHTML = phases.map((p, i) => {
        let cls = '';
        if (i < currentPhaseIndex) cls = 'done';
        else if (i === currentPhaseIndex) cls = 'active';
        const icon = i < currentPhaseIndex ? '&#10003;' : (i === currentPhaseIndex ? '&#9679;' : '');
        return `<li class="phase-item ${cls}"><span class="phase-icon">${icon}</span>${p.label}</li>
                <div class="phase-detail" id="phase-detail-${i}"></div>`;
      }).join('');
    }

    const stepToPhase = {
      'Logging into MLS...': 0,
      'Running saved search...': 1,
      'Downloading photos...': 2,
      'Extracting listing details...': 3,
      'Analyzing subject property...': 4,
      'Analyzing comp photos...': 5,
      'Skipping vision analysis...': 5,
      'Running price-only search...': 6,
      'Logging into BrokerBay...': 7,
      'Pulling showings...': 8,
      'Pulling market trends...': 9,
      'Comparing to previous report...': 10,
      'Calculating metrics...': 11,
      'Generating descriptions...': 12,
      'Done!': 13,
    };

    window.api.onProgress(({ step, detail }) => {
      const idx = stepToPhase[step];
      if (idx !== undefined && idx > currentPhaseIndex) {
        currentPhaseIndex = idx;
        renderPhases();
      }
      if (idx !== undefined) {
        const detailEl = document.getElementById(`phase-detail-${idx}`);
        if (detailEl && detail) detailEl.textContent = detail;
      }
      const fill = document.getElementById('progress-fill');
      const pct = Math.round(((currentPhaseIndex + 1) / phases.length) * 100);
      fill.style.width = `${Math.min(pct, 100)}%`;
    });

    window.api.onEmailReady((emailData) => {
      currentEmail = emailData;
      document.getElementById('progress-section').classList.add('hidden');
      document.getElementById('run-section').classList.add('hidden');
      document.getElementById('result-section').classList.remove('hidden');
      const resultEl = document.getElementById('email-result');
      if (emailData.html) {
        resultEl.innerHTML = emailData.html;
      } else {
        resultEl.textContent = emailData.text || emailData;
      }
    });

    async function runReport() {
      const address = document.getElementById('listing-address').value.trim();
      if (!address) {
        alert('Please enter the listing street name.');
        return;
      }

      document.getElementById('run-btn').disabled = true;
      document.getElementById('run-section').classList.add('hidden');
      document.getElementById('progress-section').classList.remove('hidden');
      document.getElementById('result-section').classList.add('hidden');
      currentPhaseIndex = -1;
      renderPhases();
      document.getElementById('progress-fill').style.width = '0%';

      try {
        const result = await window.api.runReport(address);

        if (result.needsReview) {
          await window.api.openReview();
        }
      } catch (err) {
        document.getElementById('progress-section').classList.add('hidden');
        document.getElementById('run-section').classList.remove('hidden');
        document.getElementById('run-btn').disabled = false;
        showError(err.message);
      }
    }

    function copyEmail() {
      if (!currentEmail) return;
      window.api.copyToClipboard({
        text: currentEmail.text || '',
        html: currentEmail.html || '',
      }).then(() => {
        alert('Email copied! Paste into Outlook — photos will be included.');
      });
    }

    function showError(message) {
      document.getElementById('error-section').classList.remove('hidden');
      document.getElementById('error-message').textContent = message;
    }

    function dismissError() {
      document.getElementById('error-section').classList.add('hidden');
    }

    function newReport() {
      currentEmail = null;
      document.getElementById('result-section').classList.add('hidden');
      document.getElementById('run-section').classList.remove('hidden');
      document.getElementById('run-btn').disabled = false;
      document.getElementById('listing-address').value = '';
    }

    function escAttr(str) {
      if (!str) return '';
      return String(str).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    async function openSettings() {
      document.getElementById('settings-modal').classList.remove('hidden');
      const config = await window.api.getConfig();
      const body = document.getElementById('settings-body');
      if (!config) {
        body.innerHTML = '<p>No configuration found.</p>';
        return;
      }
      body.innerHTML = `
        <div class="form-group">
          <label>MLS Username</label>
          <input type="text" id="s-mls-user" value="${escAttr(config.mlsUsername)}">
        </div>
        <div class="form-group">
          <label>MLS Password</label>
          <input type="password" id="s-mls-pass" value="${escAttr(config.mlsPassword)}">
        </div>
        <div class="form-group">
          <label>MLS URL</label>
          <input type="url" id="s-mls-url" value="${escAttr(config.mlsUrl)}">
        </div>
        <div class="form-group">
          <label>BrokerBay Username</label>
          <input type="text" id="s-bb-user" value="${escAttr(config.brokerBayUsername)}">
        </div>
        <div class="form-group">
          <label>BrokerBay Password</label>
          <input type="password" id="s-bb-pass" value="${escAttr(config.brokerBayPassword)}">
        </div>
        <div class="form-group">
          <label>BrokerBay URL</label>
          <input type="url" id="s-bb-url" value="${escAttr(config.brokerBayUrl || 'https://app.brokerbay.com')}">
        </div>
        <div class="form-group">
          <label>Team Brokerage</label>
          <input type="text" id="s-team-brok" value="${escAttr(config.teamBrokerage)}">
        </div>
        <div class="form-group">
          <label>Team Members (one per line)</label>
          <textarea id="s-team-members" rows="4">${escAttr((config.teamMembers || []).join('\n'))}</textarea>
        </div>
        <div class="form-group">
          <label>Lead Agent Name</label>
          <input type="text" id="s-agent" value="${escAttr(config.agentName)}">
        </div>
        <div class="form-group">
          <label>Email Template</label>
          <textarea id="s-template" rows="8">${escAttr(config.emailTemplate)}</textarea>
        </div>
        <div class="form-group">
          <label>OpenRouter API Key</label>
          <input type="password" id="s-or-key" value="${escAttr(config.openrouterApiKey)}">
        </div>
        <div class="form-group">
          <label>Vision Model</label>
          <input type="text" id="s-or-model" value="${escAttr(config.openrouterModel || 'google/gemini-2.5-flash')}">
        </div>
        <button class="btn btn-primary" onclick="saveSettings()">Save Settings</button>
      `;
    }

    async function saveSettings() {
      const existing = await window.api.getConfig();
      const config = {
        ...existing,
        mlsUsername: document.getElementById('s-mls-user').value,
        mlsPassword: document.getElementById('s-mls-pass').value,
        mlsUrl: document.getElementById('s-mls-url').value,
        brokerBayUsername: document.getElementById('s-bb-user').value,
        brokerBayPassword: document.getElementById('s-bb-pass').value,
        brokerBayUrl: document.getElementById('s-bb-url').value,
        teamBrokerage: document.getElementById('s-team-brok').value,
        teamMembers: document.getElementById('s-team-members').value.split('\n').filter(Boolean),
        agentName: document.getElementById('s-agent').value,
        emailTemplate: document.getElementById('s-template').value,
        openrouterApiKey: document.getElementById('s-or-key').value,
        openrouterModel: document.getElementById('s-or-model').value || 'google/gemini-2.5-flash',
      };
      await window.api.saveConfig(config);
      alert('Settings saved!');
      closeSettings();
    }

    function closeSettings() {
      document.getElementById('settings-modal').classList.add('hidden');
    }
  </script>
</body>
</html>
