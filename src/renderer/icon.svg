<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8956a"/>
      <stop offset="100%" stop-color="#f0c070"/>
    </linearGradient>
    <linearGradient id="roof" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8956a"/>
      <stop offset="60%" stop-color="#d4764e"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect x="2" y="2" width="508" height="508" rx="106" fill="none" stroke="#2a2a2a" stroke-width="3"/>

  <!-- House silhouette -->
  <!-- Roof -->
  <polygon points="256,100 370,200 142,200" fill="url(#roof)"/>

  <!-- House body -->
  <rect x="162" y="200" width="188" height="160" rx="4" fill="url(#accent)" opacity="0.9"/>

  <!-- Door -->
  <rect x="230" y="270" width="52" height="90" rx="26" fill="#1a1a1a"/>

  <!-- Left window -->
  <rect x="178" y="224" width="36" height="32" rx="4" fill="#1a1a1a"/>
  <line x1="196" y1="224" x2="196" y2="256" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="178" y1="240" x2="214" y2="240" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Right window -->
  <rect x="298" y="224" width="36" height="32" rx="4" fill="#1a1a1a"/>
  <line x1="316" y1="224" x2="316" y2="256" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="298" y1="240" x2="334" y2="240" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Chimney -->
  <rect x="310" y="120" width="28" height="60" rx="3" fill="#e8956a" opacity="0.7"/>

  <!-- Chart bars (market data) -->
  <rect x="120" y="392" width="40" height="56" rx="4" fill="#e8956a" opacity="0.3"/>
  <rect x="172" y="372" width="40" height="76" rx="4" fill="#e8956a" opacity="0.45"/>
  <rect x="224" y="384" width="40" height="64" rx="4" fill="#e8956a" opacity="0.6"/>
  <rect x="276" y="362" width="40" height="86" rx="4" fill="#e8956a" opacity="0.75"/>
  <rect x="328" y="378" width="40" height="70" rx="4" fill="url(#accent)" opacity="0.9"/>

  <!-- Trend line across bars -->
  <polyline points="140,404 192,382 244,394 296,370 348,386"
    fill="none" stroke="#f0c070" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

  <!-- Dot on trend line peak -->
  <circle cx="296" cy="370" r="5" fill="#f0c070"/>
</svg>
